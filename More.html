    <!-- Logout Confirmation Modal -->
    <div id="logoutModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-6 w-[85%] max-w-[320px] shadow-xl transform scale-95 transition-transform duration-300" id="logoutModalContent">
            <h3 class="text-lg font-semibold text-text-heading mb-2">Logout</h3>
            <p class="text-sm text-text-body mb-6">Are you sure you want to Logout?</p>
            <div class="flex gap-3">
                <button onclick="closeLogoutModal()" class="flex-1 py-2.5 rounded-lg border border-container-border text-text-heading font-medium hover:bg-gray-50 transition-colors">
                    cancel
                </button>
                <button onclick="confirmLogout()" class="flex-1 py-2.5 rounded-lg bg-[var(--primary-blue)] text-white font-medium hover:opacity-90 transition-colors">
                    Yes
                </button>
            </div>
        </div>
    </div>

    <!-- Logic Script -->
    <script>
        const modal = document.getElementById('logoutModal');
        const modalContent = document.getElementById('logoutModalContent');

        function showLogoutModal() {
            modal.classList.remove('hidden');
            void modal.offsetWidth; // trigger reflow
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }

        function closeLogoutModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function confirmLogout() {
            window.location.href = "onBoarding.html";
        }

        // Close on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeLogoutModal();
        });
    </script>
