<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Fabzia Turf</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Utility CSS -->
    <link rel="stylesheet" href="utility.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        .font-inter {
            font-family: 'Inter', sans-serif;
        }
        
        /* Hide scrollbars but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-50 font-lato text-[var(--text-body)] antialiased flex items-center justify-center min-h-screen">
    <!-- Mobile Container -->
    <div class="relative w-full max-w-[430px] h-[100dvh] max-h-[812px] bg-[var(--white-pure)] shadow-2xl overflow-hidden flex flex-col font-inter">
        
        <!-- Top Navigation -->
        <div class="flex items-center gap-2 px-1 py-2 border-b border-[var(--bg-container)] bg-white h-16 flex-shrink-0 z-10">
            <button onclick="handleBack()" class="flex items-center justify-center w-12 h-12 flex-shrink-0 transition-colors">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M16.9662 5.25017L10.2162 12.0002L16.9662 18.7502L15.3752 20.3412L7.03418 12.0002L15.3752 3.65918L16.9662 5.25017Z" fill="#1a1a1a"/>
                </svg>
            </button>
            <div class="flex-1">
                <h1 class="text-[#1a1a1a] text-[18px] font-normal leading-[28px] tracking-[0.04px]">
                    Edit Profile
                </h1>
            </div>
        </div>

        <!-- Form Section -->
        <div class="flex-1 overflow-y-auto no-scrollbar pb-[90px]" id="scrollContainer">
            
            <!-- Profile Image Section -->
            <div class="flex justify-center items-center h-[141px] flex-shrink-0 relative w-full">
                <!-- Hidden File Input -->
                <input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="previewImage(event)">
                
                <div class="relative cursor-pointer w-[96px] h-[96px]" onclick="document.getElementById('imageUpload').click()">
                    <img id="profilePreview" src="https://api.builder.io/api/v1/image/assets/TEMP/8d54f6aaa86b6c16bda6d9dd49e1a354fc7aff74?width=192" alt="Profile" class="w-full h-full rounded-[51px] object-cover bg-[#c0bcbc]">
                    <div class="absolute bg-[var(--primary-blue)] flex items-center justify-center rounded-full w-[30px] h-[30px] right-0 bottom-1 translate-x-1 translate-y-1">
                        <svg width="15" height="15" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19 15C19 15.5304 18.7893 16.0391 18.4142 16.4142C18.0391 16.7893 17.5304 17 17 17H3C2.46957 17 1.96086 16.7893 1.58579 16.4142C1.21071 16.0391 1 15.5304 1 15V6C1 5.46957 1.21071 4.96086 1.58579 4.58579C1.96086 4.21071 2.46957 4 3 4H6.33L7.9 2H12.1L13.67 4H17C17.5304 4 18.0391 4.21071 18.4142 4.58579C18.7893 4.96086 19 5.46957 19 6V15Z" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M10 13.5C12.4853 13.5 14.5 11.4853 14.5 9C14.5 6.51472 12.4853 4.5 10 4.5C7.51472 4.5 5.5 6.51472 5.5 9C5.5 11.4853 7.51472 13.5 10 13.5Z" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-[20px] px-4 h-full pb-4">
                
                <!-- Name -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="text-[#1a1a1a] text-[14px] font-semibold tracking-[0.04px] leading-[1.6]">Name</label>
                    <div class="border border-[#d7d7d7] flex items-center px-[12px] py-[8px] h-[52px] rounded-lg w-full bg-white transition-colors focus-within:border-[var(--primary-blue)] focus-within:ring-1 focus-within:ring-[var(--primary-blue)]">
                        <input type="text" value="Anand" class="form-input w-full h-full text-[#0f0f0f] text-[16px] font-normal tracking-[0.5px] leading-[24px] outline-none bg-transparent">
                    </div>
                </div>

                <!-- Email -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="text-[#1a1a1a] text-[14px] font-semibold tracking-[0.04px] leading-[1.6]">Email</label>
                    <div class="border border-[#d7d7d7] flex items-center px-[12px] py-[8px] h-[52px] rounded-lg w-full bg-white transition-colors focus-within:border-[var(--primary-blue)] focus-within:ring-1 focus-within:ring-[var(--primary-blue)]">
                        <input type="email" value="abc@gmail.com" class="form-input w-full h-full text-[#4d4d4d] text-[16px] font-normal tracking-[0.5px] leading-[24px] outline-none bg-transparent">
                    </div>
                </div>
                
                <!-- Password -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="text-[#1a1a1a] text-[14px] font-semibold tracking-[0.04px] leading-[1.6]">Password</label>
                    <div class="border border-[#d7d7d7] flex items-center px-[12px] py-[8px] h-[52px] rounded-lg w-full bg-white transition-colors focus-within:border-[var(--primary-blue)] focus-within:ring-1 focus-within:ring-[var(--primary-blue)] relative">
                        <input type="password" id="passwordInput" value="Password" class="form-input w-full h-full text-[#0f0f0f] text-[16px] font-normal tracking-[0.5px] leading-[24px] outline-none bg-transparent pr-10">
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#4d4d4d] focus:outline-none">
                            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="#4D4D4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="12" cy="12" r="3" stroke="#4D4D4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <svg id="eyeSlashIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="hidden">
                                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22" stroke="#4D4D4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- Phone Number -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="text-[#1a1a1a] text-[14px] font-semibold tracking-[0.04px] leading-[1.6]">Phone Number</label>
                    <div class="border border-[#d7d7d7] flex items-center px-[12px] py-[8px] h-[52px] rounded-lg w-full bg-white overflow-hidden transition-colors focus-within:border-[var(--primary-blue)] focus-within:ring-1 focus-within:ring-[var(--primary-blue)]">
                        <input type="text" value="+91 12345-54321" class="form-input w-full h-full text-[#4d4d4d] text-[16px] font-normal tracking-[0.5px] leading-[24px] outline-none bg-transparent">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="flex-shrink-0">
                            <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 16.5V17.5" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 7.5V13.5" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>

                <!-- Gst Details Separator -->
                <div class="border-b border-[#d7d7d7] w-full py-1 mt-1">
                    <p class="text-[#1a1a1a] text-[16px] font-medium leading-[28px]">Gst Details</p>
                </div>
                
                <!-- Registration Number -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="text-[#1a1a1a] text-[14px] font-semibold tracking-[0.04px] leading-[1.6]">Registration Number</label>
                    <div class="border border-[#d7d7d7] flex items-center px-[12px] py-[8px] h-[52px] rounded-lg w-full bg-white transition-colors focus-within:border-[var(--primary-blue)] focus-within:ring-1 focus-within:ring-[var(--primary-blue)]">
                        <input type="text" placeholder="Registration Number" value="" class="form-input w-full h-full text-[#0f0f0f] text-[16px] font-normal tracking-[0.5px] leading-[24px] outline-none bg-transparent placeholder-[#ababab]">
                    </div>
                </div>
                
                <!-- Company Name -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="text-[#1a1a1a] text-[14px] font-semibold tracking-[0.04px] leading-[1.6]">Company Name</label>
                    <div class="border border-[#d7d7d7] flex items-center px-[12px] py-[8px] h-[52px] rounded-lg w-full bg-white transition-colors focus-within:border-[var(--primary-blue)] focus-within:ring-1 focus-within:ring-[var(--primary-blue)]">
                        <input type="text" placeholder="Company Name" value="" class="form-input w-full h-full text-[#0f0f0f] text-[16px] font-normal tracking-[0.5px] leading-[24px] outline-none bg-transparent placeholder-[#ababab]">
                    </div>
                </div>
                
                <!-- Address -->
                <div class="flex flex-col gap-2 w-full">
                    <label class="text-[#1a1a1a] text-[14px] font-semibold tracking-[0.04px] leading-[1.6]">Address</label>
                    <div class="border border-[#d7d7d7] flex items-start px-[12px] py-[8px] h-[99px] rounded-lg w-full bg-white transition-colors focus-within:border-[var(--primary-blue)] focus-within:ring-1 focus-within:ring-[var(--primary-blue)]">
                        <textarea placeholder="Address" class="form-input w-full h-full text-[#0f0f0f] text-[16px] font-normal tracking-[0.5px] leading-[24px] outline-none bg-transparent resize-none placeholder-[#ababab]"></textarea>
                    </div>
                </div>
                
            </div>
        </div>

        <!-- Bottom Action Buttons -->
        <!-- Fixed to bottom -->
        <div class="px-4 py-2 flex items-center justify-center border-t border-[#d7d7d7] shadow-[0px_-2px_10px_rgba(0,0,0,0.05)] bg-[#fffefe] h-[80px] w-full z-20 flex-shrink-0">
            <div class="flex items-center w-full h-[48px] gap-2">
                <button onclick="handleBack()" class="flex-1 flex justify-center items-center rounded-lg h-full transition-colors text-[#1a1a1a] font-normal text-[16px] tracking-[0.5px]">
                    Cancel
                </button>
                <button onclick="saveData()" class="flex-1 flex justify-center items-center rounded-lg h-full bg-[var(--primary-blue)] text-white font-normal text-[16px] tracking-[0.5px] hover:opacity-90 transition-opacity">
                    Update
                </button>
            </div>
        </div>
        
        <!-- Unsaved Changes Modal -->
        <div id="unsavedModal" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-black/50 transition-opacity">
            <div class="bg-white rounded-2xl p-6 w-[85%] max-w-[320px] shadow-xl text-center flex flex-col items-center">
                <h3 class="text-[18px] font-semibold text-[#1a1a1a] font-inter">Do you want to Update Data?</h3>
                <div class="flex gap-3 w-full mt-6">
                    <button onclick="confirmNo()" class="flex-1 py-2.5 rounded-lg border border-[#d7d7d7] text-[#1a1a1a] font-medium hover:bg-gray-50 transition-colors">
                        No
                    </button>
                    <button onclick="confirmYes()" class="flex-1 py-2.5 rounded-lg bg-[var(--primary-blue)] text-white font-medium hover:opacity-90 transition-colors">
                        Yes
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Script for Interactions -->
    <script>
        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeSlashIcon = document.getElementById('eyeSlashIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeSlashIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeSlashIcon.classList.add('hidden');
                eyeIcon.classList.remove('hidden');
            }
        }

        // Image Preview
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profilePreview').src = e.target.result;
                    isDirty = true; // Mark as edited if image is changed
                };
                reader.readAsDataURL(file);
            }
        }

        // Make sure active text field is scrolled into view above keyboard
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                setTimeout(() => {
                    this.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 300);
            });
        });

        // Track changes and Modal display
        let isDirty = false;
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', () => {
                isDirty = true;
            });
        });

        function handleBack() {
            if (isDirty) {
                document.getElementById('unsavedModal').classList.remove('hidden');
            } else {
                window.history.back();
            }
        }

        function confirmNo() {
            window.history.back();
        }

        function confirmYes() {
            // "Yes" means update data
            saveData();
            document.getElementById('unsavedModal').classList.add('hidden');
            window.history.back();
        }
        
        function saveData() {
            // Update logic here
            isDirty = false; // Reset dirty state
            console.log('Data updated');
        }
    </script>
</body>
</html>
