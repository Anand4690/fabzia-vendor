<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reset Password - Fabzia</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Utility styles -->
    <link rel="stylesheet" href="utility.css">
    <style>
        :root {
            --primary: var(--primary-blue);
            --error: var(--error-red);
        }
        body {
            background-color: #FFFEFE;
            color: var(--text-primary);
            font-family: 'Lato', sans-serif;
            height: 100%;
            overflow: hidden;
        }
        html {
            height: 100%;
        }
        .input-focus:focus-within {
            border-color: var(--primary-blue) !important;
        }
        .border-error {
            border-color: var(--error-red) !important;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="flex flex-col items-center h-[100dvh]">
    <div class="w-full max-w-[430px] flex flex-col h-full overflow-hidden relative">
        <!-- ── Toaster ── -->
        <div id="toaster" class="pointer-events-none absolute top-4 left-4 right-4 z-[100] transform -translate-y-[150%] transition-all duration-300 flex items-center gap-3 rounded-lg px-4 py-3 shadow-md mx-auto opacity-0 border bg-white">
            <div id="toaster-icon" class="flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-full text-white"></div>
            <div class="flex-1">
                <p id="toaster-msg" class="text-[14px] font-semibold tracking-[0.04px] text-[var(--text-primary)]"></p>
            </div>
            <button type="button" onclick="hideToaster()" class="pointer-events-auto flex-shrink-0 p-1 text-gray-400 hover:text-gray-600 focus:outline-none rounded-full hover:bg-gray-100 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        
        <!-- ── Sticky Header ── -->
        <div class="flex flex-col gap-2 px-5 pt-10 pb-4 bg-[#FFFEFE] shrink-0">
            <button onclick="history.back()" type="button" aria-label="Go back" 
                class="flex h-9 w-9 items-center justify-center rounded-full bg-[var(--bg-soft)] focus:outline-none active:bg-gray-200 transition-colors">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M15 6L9 12L15 18" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="mt-2 flex flex-col gap-1">
                <h1 class="text-[32px] font-semibold leading-[40px] tracking-[0.04px] text-[var(--text-primary)]">
                    Create new password
                </h1>
                <p class="text-[14px] font-normal leading-[150%] tracking-[0.04px] text-[var(--text-secondary)]">
                    Choose a password you haven’t used before.
                </p>
            </div>
        </div>

        <!-- ── Form Body ── -->
        <div class="flex-1 overflow-y-auto no-scrollbar px-5 pb-4">
            <form id="reset-password-form" class="mt-6 flex flex-col gap-4">
                <!-- Password Field -->
                <div class="flex flex-col gap-2 field-group">
                    <label class="text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-[var(--text-primary)]">Password</label>
                    <div class="flex h-[52px] items-center gap-4 rounded-[8px] border border-[var(--border-light)] bg-white px-3 transition-colors input-focus container-el" id="password-container">
                        <input type="password" id="password-input" placeholder="Password" 
                            class="flex-1 bg-transparent text-[16px] outline-none placeholder:text-[var(--text-placeholder)]">
                        
                        <!-- Toggle Button -->
                        <button type="button" id="password-toggle" class="flex-shrink-0 p-0.5 focus:outline-none" aria-label="Toggle password visibility">
                            <svg id="eye-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path d="M4.5 12.5C7.5 6 16.5 6 19.5 12.5" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M12 16C10.8954 16 10 15.1046 10 14C10 12.8954 10.8954 12 12 12C13.1046 12 14 12.8954 14 14C14 15.1046 13.1046 16 12 16Z" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>

                        <!-- Error Icon -->
                        <div id="password-error-icon" class="hidden flex h-6 w-6 flex-shrink-0 items-center justify-center rounded-full bg-[var(--error-red)]">
                            <span class="text-[12px] font-bold leading-none text-white">!</span>
                        </div>
                    </div>
                    <p id="password-error-text" class="hidden text-[13px] font-normal leading-[150%] text-[var(--error-red)]">Password is required</p>
                </div>

                <!-- Confirm Password Field -->
                <div class="flex flex-col gap-2 field-group">
                    <label class="text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-[var(--text-primary)]">Confirm Password</label>
                    <div class="flex h-[52px] items-center gap-4 rounded-[8px] border border-[var(--border-light)] bg-white px-3 transition-colors input-focus container-el" id="confirm-password-container">
                        <input type="password" id="confirm-password-input" placeholder="Password" 
                            class="flex-1 bg-transparent text-[16px] outline-none placeholder:text-[var(--text-placeholder)]">
                        
                        <button type="button" id="confirm-password-toggle" class="flex-shrink-0 p-0.5 focus:outline-none" aria-label="Toggle password visibility">
                            <svg id="confirm-eye-icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path d="M4.5 12.5C7.5 6 16.5 6 19.5 12.5" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M12 16C10.8954 16 10 15.1046 10 14C10 12.8954 10.8954 12 12 12C13.1046 12 14 12.8954 14 14C14 15.1046 13.1046 16 12 16Z" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>

                        <div id="confirm-error-icon" class="hidden flex h-6 w-6 flex-shrink-0 items-center justify-center rounded-full bg-[var(--error-red)]">
                            <span class="text-[12px] font-bold leading-none text-white">!</span>
                        </div>
                    </div>
                    <p id="confirm-error-text" class="hidden text-[13px] font-normal leading-[150%] text-[var(--error-red)]">Passwords do not match</p>
                </div>
            </form>
        </div>

        <!-- ── Sticky Bottom Button ── -->
        <div class="px-5 pb-8 pt-4 bg-[#FFFEFE] shrink-0">
            <button type="button" onclick="handleReset()"
                class="flex h-[52px] w-full items-center justify-center rounded-[8px] bg-[var(--primary-blue)] px-4 text-[16px] font-semibold leading-7 text-[#F9F6F3] transition-opacity active:opacity-80">
                Reset Password
            </button>
        </div>
    </div>

    <script>
        // ── Toaster Logic ──
        let toasterTimeout;
        function showToaster(type, message) {
            const toaster = document.getElementById('toaster');
            const iconWrap = document.getElementById('toaster-icon');
            const msgEl = document.getElementById('toaster-msg');
            
            clearTimeout(toasterTimeout);
            
            if (type === 'success') {
                toaster.className = 'pointer-events-auto absolute top-4 left-4 right-4 z-[100] transform transition-all duration-300 flex items-center gap-3 rounded-lg px-4 py-3 shadow-lg mx-auto border border-[#E8F0FE] bg-white translate-y-0 opacity-100';
                iconWrap.className = 'flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-full bg-[var(--primary-blue)] text-white';
                iconWrap.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            } else {
                toaster.className = 'pointer-events-auto absolute top-4 left-4 right-4 z-[100] transform transition-all duration-300 flex items-center gap-3 rounded-lg px-4 py-3 shadow-lg mx-auto border border-red-100 bg-white translate-y-0 opacity-100';
                iconWrap.className = 'flex-shrink-0 flex items-center justify-center w-6 h-6 rounded-full bg-[var(--error-red)] text-white';
                iconWrap.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
            }
            msgEl.textContent = message;
            toasterTimeout = setTimeout(() => hideToaster(), 3000);
        }

        function hideToaster() {
            const toaster = document.getElementById('toaster');
            toaster.classList.remove('translate-y-0', 'opacity-100', 'pointer-events-auto');
            toaster.classList.add('-translate-y-[150%]', 'opacity-0', 'pointer-events-none');
        }

        const passwordInput = document.getElementById('password-input');
        const passwordToggle = document.getElementById('password-toggle');
        const eyeIcon = document.getElementById('eye-icon');
        const passwordContainer = document.getElementById('password-container');
        const passwordErrorIcon = document.getElementById('password-error-icon');
        const passwordErrorText = document.getElementById('password-error-text');

        const confirmPasswordInput = document.getElementById('confirm-password-input');
        const confirmPasswordToggle = document.getElementById('confirm-password-toggle');
        const confirmEyeIcon = document.getElementById('confirm-eye-icon');
        const confirmContainer = document.getElementById('confirm-password-container');
        const confirmErrorIcon = document.getElementById('confirm-error-icon');
        const confirmErrorText = document.getElementById('confirm-error-text');

        const eyeOpen = `<path d="M4.5 12.5C7.5 6 16.5 6 19.5 12.5" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 16C10.8954 16 10 15.1046 10 14C10 12.8954 10.8954 12 12 12C13.1046 12 14 12.8954 14 14C14 15.1046 13.1046 16 12 16Z" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;
        const eyeClosed = `<path d="M3 3L21 21" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10.58 10.58A2 2 0 0 0 14 14" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.88 5.17A10.7 10.7 0 0 1 12 5c4.97 0 8.7 3.93 9.5 7.5-.37 1.64-1.16 3.14-2.24 4.36" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.61 6.61A10.48 10.48 0 0 0 2.5 12.5C3.3 16.07 7.03 20 12 20c1.7 0 3.3-.42 4.72-1.17" stroke="#4D4D4D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;

        // Toggles
        passwordToggle.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.innerHTML = isPassword ? eyeClosed : eyeOpen;
        });

        confirmPasswordToggle.addEventListener('click', () => {
            const isPassword = confirmPasswordInput.type === 'password';
            confirmPasswordInput.type = isPassword ? 'text' : 'password';
            confirmEyeIcon.innerHTML = isPassword ? eyeClosed : eyeOpen;
        });

        // Clear errors on input
        passwordInput.addEventListener('input', () => {
            passwordContainer.classList.remove('border-error');
            passwordErrorIcon.classList.add('hidden');
            passwordErrorText.classList.add('hidden');
            passwordToggle.classList.remove('hidden');
        });

        confirmPasswordInput.addEventListener('input', () => {
            confirmContainer.classList.remove('border-error');
            confirmErrorIcon.classList.add('hidden');
            confirmErrorText.classList.add('hidden');
            confirmPasswordToggle.classList.remove('hidden');
        });

        function handleReset() {
            let isValid = true;

            // Validate Password
            if (!passwordInput.value) {
                passwordContainer.classList.add('border-error');
                passwordErrorIcon.classList.remove('hidden');
                passwordErrorText.classList.remove('hidden');
                passwordToggle.classList.add('hidden');
                isValid = false;
            }

            // Validate Confirm
            if (confirmPasswordInput.value !== passwordInput.value || !confirmPasswordInput.value) {
                confirmContainer.classList.add('border-error');
                confirmErrorIcon.classList.remove('hidden');
                confirmErrorText.classList.remove('hidden');
                confirmPasswordToggle.classList.add('hidden');
                isValid = false;
            }

            if (isValid) {
                showToaster('success', 'Password reset successful!');
                setTimeout(() => { window.location.href = 'Login.html'; }, 1500);
            } else {
                showToaster('error', 'Please resolve the errors above.');
            }
        }
    </script>
</body>
</html>
