<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dashboard Details - Fabzia Vendor App</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="utility.css" />

  <style>
    /* ── Base ── */
    html, body {
      height: 100%;
      font-family: 'Lato', sans-serif;
      background: var(--bg-light);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Shell ── */
    .mobile-shell {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: var(--bg-light);
    }

    /* ── Sticky header ── */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: var(--bg-light);
    }

    /* ── Scrollable body ── */
    .main-scroll {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 32px;
    }
    .main-scroll::-webkit-scrollbar { display: none; }
    .main-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Revenue card ── */
    .revenue-card {
      background: var(--white-pure);
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    /* ── Filter pill (dropdown trigger) ── */
    .filter-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--text-heading);
      border-radius: 18px;
      padding: 4px 10px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-pill:active { background: var(--bg-soft); }

    /* ── Dropdown menu ── */
    .filter-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: var(--white-pure);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      z-index: 100;
      min-width: 160px;
      overflow: hidden;
      transform-origin: top right;
      animation: dropIn 0.18s ease;
    }
    @keyframes dropIn {
      from { opacity: 0; transform: scale(0.95) translateY(-4px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);     }
    }
    .filter-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text-heading);
      cursor: pointer;
      transition: background 0.15s;
    }
    .filter-option:not(:last-child) { border-bottom: 1px solid var(--border-light); }
    .filter-option:active,
    .filter-option.selected { background: var(--bg-soft); }
    .filter-option.selected { font-weight: 600; color: var(--primary-blue); }

    /* ── Search bar ── */
    .search-bar {
      background: var(--white-pure);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      flex: 1;
    }
    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: 'Lato', sans-serif;
      color: var(--text-heading);
      background: transparent;
    }
    .search-bar input::placeholder { color: var(--text-placeholder); font-size: 14px; }

    /* ── Filter button (icon square) ── */
    .filter-btn {
      width: 48px;
      height: 48px;
      background: var(--white-pure);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }
    .filter-btn:active { background: var(--bg-soft); }

    /* ── Transaction rows ── */
    .txn-card {
      background: var(--white-pure);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
    }
    .txn-icon {
      width: 28px;
      height: 28px;
      background: #f3f4f9;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .txn-amount-debit  { color: #f1363b; font-size: 14px; font-weight: 500; white-space: nowrap; }
    .txn-amount-credit { color: #07a348; font-size: 14px; font-weight: 500; white-space: nowrap; }

    /* ── Custom date bottom sheet ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.show { opacity: 1; pointer-events: all; }
    .sheet {
      background: var(--white-pure);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 430px;
      padding: 24px 20px 32px;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .overlay.show .sheet { transform: translateY(0); }

    /* ── Pill toggle for active filter ── */
    .range-pills { display: flex; gap: 8px; flex-wrap: nowrap; overflow-x: auto; }
    .range-pill {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border-light);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-body);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .range-pill.active {
      border-color: var(--primary-blue);
      background: rgba(18,93,205,0.08);
      color: var(--primary-blue);
    }

    /* ── Date inputs ── */
    .date-row {
      display: flex;
      gap: 10px;
    }
    .date-input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .date-input-wrap label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-body);
    }
    .date-input-wrap input[type=date] {
      width: 100%;
      height: 44px;
      border: 1.5px solid var(--border-light);
      border-radius: 8px;
      padding: 0 10px;
      font-size: 14px;
      color: var(--text-heading);
      font-family: 'Lato', sans-serif;
      outline: none;
    }
    .date-input-wrap input[type=date]:focus { border-color: var(--primary-blue); }
  </style>
</head>
<body>

<div class="mobile-shell">

  <!-- ════ STICKY HEADER ════ -->
  <header class="page-header">
    <div class="flex items-center gap-2 h-[56px] px-2">
      <!-- Back -->
      <a href="Home.html"
         class="w-12 h-12 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors flex-shrink-0">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M15 18L9 12L15 6" stroke="var(--text-heading)" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <h1 class="text-[#1f2024] text-[20px] font-medium leading-7 tracking-[0.04px]">
        Dashboard Details
      </h1>
    </div>
  </header>

  <!-- ════ SCROLLABLE MAIN ════ -->
  <main class="main-scroll">
    <div class="flex flex-col gap-6 px-4 pt-2">

      <!-- ── Revenue Card ── -->
      <div class="revenue-card">
        <!-- Left: stats -->
        <div class="flex flex-col gap-1">
          <p class="text-[var(--text-body)] text-[14px] font-normal leading-[21px]">Total Revenue</p>
          <p class="text-[var(--text-heading)] text-[24px] font-semibold leading-8" id="revenue-amount">₹5,00,000</p>
          <p class="text-[var(--text-body)] text-[14px] font-normal leading-[21px]">24 Turfs</p>
        </div>

        <!-- Right: time filter pill -->
        <div class="relative" id="filter-pill-wrapper">
          <div class="filter-pill" id="filter-pill-btn" onclick="toggleFilterDropdown()">
            <span class="text-[12px] font-normal text-[#111]" id="filter-pill-label">This Month</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M6 9l6 6 6-6" stroke="var(--text-heading)" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>

          <!-- Dropdown -->
          <div class="filter-dropdown hidden" id="filter-dropdown">
            <div class="filter-option selected" data-value="This Month" onclick="selectFilter(this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="4" width="18" height="17" rx="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              This Month
            </div>
            <div class="filter-option" data-value="Last 30 Days" onclick="selectFilter(this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
                <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              Last 30 Days
            </div>
            <div class="filter-option" data-value="Custom" onclick="selectFilter(this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M4 6h16M4 12h10M4 18h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              Custom
            </div>
          </div>
        </div>
      </div>

      <!-- ── Search + Filter ── -->
      <div class="flex gap-2 items-center">
        <div class="search-bar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" flex-shrink="0">
            <circle cx="11" cy="11" r="7" stroke="var(--text-placeholder)" stroke-width="1.5"/>
            <path d="M20 20l-3.5-3.5" stroke="var(--text-placeholder)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            type="search"
            id="txn-search"
            placeholder="Search for Transaction"
            oninput="filterTransactions()"
            autocomplete="off"
          />
          <!-- Clear -->
          <button id="clear-search" class="hidden" onclick="clearSearch()" aria-label="Clear search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M18 6L6 18M6 6l12 12" stroke="var(--text-placeholder)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <!-- Filter icon button -->
        <button class="filter-btn" onclick="openFilterSheet()" aria-label="Filter transactions">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M4 6h16M7 12h10M10 18h4" stroke="var(--text-heading)" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- ── Transaction List ── -->
      <div class="flex flex-col gap-2" id="txn-list">
        <!-- JS rendered -->
      </div>

      <!-- Empty state -->
      <div id="txn-empty" class="hidden flex flex-col items-center justify-center py-16 gap-3 text-center">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="var(--text-placeholder)" stroke-width="1.5"/>
          <path d="M20 20l-3.5-3.5" stroke="var(--text-placeholder)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p class="text-[var(--text-body)] text-sm">No transactions found.</p>
      </div>

    </div>
  </main>

</div><!-- /mobile-shell -->

<!-- ════ CUSTOM DATE BOTTOM SHEET ════ -->
<div class="overlay" id="custom-sheet-overlay" onclick="overlayClickClose(event)">
  <div class="sheet" onclick="event.stopPropagation()">

    <!-- Handle -->
    <div class="w-10 h-1 bg-gray-300 rounded mx-auto mb-5"></div>

    <h2 class="text-[var(--text-heading)] text-[17px] font-semibold mb-5">Select Date Range</h2>

    <!-- Range pills -->
    <div class="range-pills mb-5">
      <div class="range-pill active" data-range="This Month"   onclick="selectSheetRange(this)">This Month</div>
      <div class="range-pill"        data-range="Last 30 Days" onclick="selectSheetRange(this)">Last 30 Days</div>
      <div class="range-pill"        data-range="Custom"       onclick="selectSheetRange(this)">Custom</div>
    </div>

    <!-- Custom date inputs (shown only in Custom mode) -->
    <div id="custom-date-inputs" class="date-row mb-5 hidden">
      <div class="date-input-wrap">
        <label>From</label>
        <input type="date" id="date-from" />
      </div>
      <div class="date-input-wrap">
        <label>To</label>
        <input type="date" id="date-to" />
      </div>
    </div>

    <!-- Apply -->
    <button onclick="applyFilter()"
            class="w-full h-12 bg-[var(--primary-blue)] text-white rounded-lg font-semibold text-[15px] hover:opacity-90 transition-opacity">
      Apply Filter
    </button>

  </div>
</div>

<!-- ════ SCRIPTS ════ -->
<script>
/* ────────────────────────────────────
   Transaction data
──────────────────────────────────── */
const allTransactions = [
  { id: 'T001', turf: 'The Multisports Turf',            date: '12 Jan 2026', amount: -400,  type: 'debit'  },
  { id: 'T002', turf: 'Ultimate Powerplay Turf',         date: '12 Jan 2026', amount: -400,  type: 'debit'  },
  { id: 'T003', turf: 'Battlefield Delhi Vaishali Nagar',date: '12 Jan 2026', amount: -400,  type: 'debit'  },
  { id: 'T004', turf: 'Kes Turf',                        date: '10 Jan 2026', amount: -100,  type: 'debit'  },
  { id: 'T005', turf: 'Strike Hill Side Turf',           date: '1 Jan 2026',  amount: +100,  type: 'credit' },
  { id: 'T006', turf: 'The Multisports Turf',            date: '28 Feb 2026', amount: -250,  type: 'debit'  },
  { id: 'T007', turf: 'Universal Turf',                  date: '25 Feb 2026', amount: +600,  type: 'credit' },
  { id: 'T008', turf: 'Maestro Turf',                    date: '20 Feb 2026', amount: -350,  type: 'debit'  },
];

let visibleTransactions = [...allTransactions];
let activeFilter = 'This Month';

/* ────────────────────────────────────
   Render
──────────────────────────────────── */
function renderTransactions(list) {
  const container = document.getElementById('txn-list');
  const empty     = document.getElementById('txn-empty');

  if (!list.length) {
    container.innerHTML = '';
    empty.classList.remove('hidden');
    empty.classList.add('flex');
    return;
  }
  empty.classList.add('hidden');
  empty.classList.remove('flex');

  container.innerHTML = list.map(t => {
    const isCredit  = t.type === 'credit';
    const amountStr = isCredit ? `+ ₹${Math.abs(t.amount)}` : `- ₹${Math.abs(t.amount)}`;
    const iconClass = isCredit ? 'rotate-180' : '';
    const amtClass  = isCredit ? 'txn-amount-credit' : 'txn-amount-debit';

    return `
      <div class="txn-card">
        <div class="flex items-center gap-3">
          <!-- Arrow icon (outward = debit, inward = credit) -->
          <div class="txn-icon ${iconClass}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M7 17L17 7M17 7H8M17 7V16"
                    stroke="var(--text-heading)" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="flex flex-col gap-0.5">
            <p class="text-[var(--text-heading)] text-[14px] font-normal leading-[21px] tracking-[0.04px]">${t.turf}</p>
            <p class="text-[var(--text-body)] text-[12px] font-normal leading-[18px]">${t.date}</p>
          </div>
        </div>
        <p class="${amtClass}">${amountStr}</p>
      </div>`;
  }).join('');
}

renderTransactions(visibleTransactions);

/* ────────────────────────────────────
   Live search
──────────────────────────────────── */
function filterTransactions() {
  const q       = document.getElementById('txn-search').value.trim().toLowerCase();
  const clearBtn = document.getElementById('clear-search');
  clearBtn.classList.toggle('hidden', !q);

  const filtered = visibleTransactions.filter(t =>
    t.turf.toLowerCase().includes(q) || t.date.toLowerCase().includes(q)
  );
  renderTransactions(filtered);
}

function clearSearch() {
  document.getElementById('txn-search').value = '';
  document.getElementById('clear-search').classList.add('hidden');
  renderTransactions(visibleTransactions);
}

/* ────────────────────────────────────
   Revenue card dropdown filter
──────────────────────────────────── */
function toggleFilterDropdown() {
  const dd = document.getElementById('filter-dropdown');
  dd.classList.toggle('hidden');
}

function selectFilter(el) {
  const val = el.dataset.value;
  document.querySelectorAll('.filter-option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('filter-pill-label').textContent = val;
  document.getElementById('filter-dropdown').classList.add('hidden');

  activeFilter = val;

  if (val === 'Custom') {
    openFilterSheet();
    return;
  }
  applyDateFilter(val);
}

// Close dropdown on outside click
document.addEventListener('click', function(e) {
  const wrapper = document.getElementById('filter-pill-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    document.getElementById('filter-dropdown').classList.add('hidden');
  }
});

/* ────────────────────────────────────
   Apply date filter (demo logic)
──────────────────────────────────── */
function applyDateFilter(range) {
  // In a real app you'd filter by actual date range.
  // Here we just show all / subset for demo.
  if (range === 'This Month') {
    visibleTransactions = allTransactions.filter(t => t.date.includes('Mar 2026') || t.date.includes('Feb 2026'));
    if (!visibleTransactions.length) visibleTransactions = [...allTransactions]; // fallback for demo
  } else if (range === 'Last 30 Days') {
    visibleTransactions = allTransactions.filter(t => t.date.includes('Feb 2026') || t.date.includes('Jan 2026'));
  } else {
    visibleTransactions = [...allTransactions];
  }
  renderTransactions(visibleTransactions);
}

/* ────────────────────────────────────
   Bottom sheet (filter / custom range)
──────────────────────────────────── */
function openFilterSheet() {
  syncSheetPills();
  document.getElementById('custom-sheet-overlay').classList.add('show');
}

function closeFilterSheet() {
  document.getElementById('custom-sheet-overlay').classList.remove('show');
}

function overlayClickClose(e) {
  if (e.target === document.getElementById('custom-sheet-overlay')) closeFilterSheet();
}

function syncSheetPills() {
  document.querySelectorAll('.range-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.range === activeFilter);
  });
  document.getElementById('custom-date-inputs').classList.toggle('hidden', activeFilter !== 'Custom');
}

function selectSheetRange(el) {
  document.querySelectorAll('.range-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  activeFilter = el.dataset.range;
  document.getElementById('custom-date-inputs').classList.toggle('hidden', activeFilter !== 'Custom');
}

function applyFilter() {
  // Update pill label
  document.getElementById('filter-pill-label').textContent = activeFilter;

  // Sync dropdown selected state
  document.querySelectorAll('.filter-option').forEach(o => {
    o.classList.toggle('selected', o.dataset.value === activeFilter);
  });

  if (activeFilter === 'Custom') {
    const from = document.getElementById('date-from').value;
    const to   = document.getElementById('date-to').value;
    // For demo: just show all if custom dates not filled
    visibleTransactions = [...allTransactions];
  } else {
    applyDateFilter(activeFilter);
  }

  clearSearch();
  closeFilterSheet();
}
</script>

</body>
</html>
