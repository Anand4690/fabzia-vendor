<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Slot - Fabzia Turf</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Utility CSS -->
    <link rel="stylesheet" href="utility.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        .font-inter {
            font-family: 'Inter', sans-serif;
        }
        /* Hide scrollbars but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .turf-card {
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .turf-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body class="bg-gray-50 font-lato text-[var(--text-body)] antialiased flex items-center justify-center min-h-screen">

    <!-- Mobile Container -->
    <div class="relative w-full max-w-[430px] h-screen max-h-[812px] bg-[var(--bg-soft)] shadow-2xl overflow-hidden flex flex-col">
        
        <!-- Top Navigation -->
        <div class="flex items-center gap-2 px-1 py-2 border-b border-[var(--border-light)] bg-white h-16 flex-shrink-0 z-10">
            <button onclick="window.history.back()" class="flex items-center justify-center w-12 h-12 flex-shrink-0 hover:bg-gray-50 rounded-full transition-colors">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M16.9662 5.25017L10.2162 12.0002L16.9662 18.7502L15.3752 20.3412L7.03418 12.0002L15.3752 3.65918L16.9662 5.25017Z" fill="var(--text-heading)"/>
                </svg>
            </button>
            <div class="flex-1">
                <h1 class="text-[var(--text-heading)] text-[18px] font-normal leading-[28px] tracking-[0.04px] font-inter">
                    Book Slot
                </h1>
            </div>
        </div>

        <!-- Search Bar -->
        <div class="px-4 py-4 bg-white flex-shrink-0">
            <div class="flex items-center gap-3 bg-[var(--white-pure)] border border-[var(--border-light)] rounded-lg px-3 py-3 w-full focus-within:border-[var(--primary-blue)] focus-within:ring-1 focus-within:ring-[var(--primary-blue)] transition-all shadow-sm">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 flex-shrink-0">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" placeholder="Search for turf" class="flex-1 bg-transparent outline-none text-[16px] font-inter text-[var(--text-heading)] placeholder-gray-400">
            </div>
        </div>

        <!-- Main Content Area (Grid of Cards) -->
        <div class="flex-1 overflow-y-auto no-scrollbar px-4 pb-20 pt-2 bg-[var(--bg-soft)]">
            <div class="grid grid-cols-2 gap-4">
                
                <!-- Card 1 -->
                <div class="turf-card bg-[var(--white-pure)] rounded-xl overflow-hidden flex flex-col border border-[var(--border-light)] cursor-pointer" onclick="window.location.href='#'">
                    <!-- Image Wrapper -->
                    <div class="relative h-[140px] w-full bg-gray-200">
                        <img src="https://images.unsplash.com/photo-1518605368461-1e1296cb3b54?w=400&q=80" alt="Turf" class="w-full h-full object-cover">
                        
                        <!-- 50% OFF Badge -->
                        <div class="absolute top-2 left-2 bg-white/95 backdrop-blur-sm text-[10px] font-bold text-[var(--text-heading)] px-2 py-1 rounded shadow-sm font-inter tracking-wide">
                            50% OFF
                        </div>
                        
                        <!-- Rating Label -->
                        <div class="absolute -bottom-3 left-2 bg-[var(--primary-blue-dark)] text-white text-[12px] font-medium px-2.5 py-0.5 rounded-full flex items-center gap-1 border-[1.5px] border-white z-10 shadow-sm">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                            <span>4.2</span>
                        </div>
                    </div>
                    
                    <!-- Details -->
                    <div class="p-3 pt-5 flex flex-col flex-1 justify-between gap-1">
                        <div class="flex flex-col gap-1">
                            <h3 class="text-[14px] font-semibold text-[var(--text-heading)] leading-tight truncate font-inter">The Multisports Turf</h3>
                            <div class="flex items-center gap-1 text-[12px] text-[var(--text-body)]">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="flex-shrink-0">
                                    <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" fill="#3D3D3D"/>
                                </svg>
                                <span class="truncate">Thane west (2km)</span>
                            </div>
                        </div>
                        
                        <div class="text-[12px] font-medium text-[var(--primary-blue)] mt-1 font-inter">
                            ₹200 onwards
                        </div>
                        
                        <button class="w-full bg-[var(--primary-blue-dark)] text-white text-[14px] font-medium py-2 rounded shadow-sm hover:opacity-90 transition-opacity mt-2 font-roboto tracking-wide">
                            Book Now
                        </button>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="turf-card bg-[var(--white-pure)] rounded-xl overflow-hidden flex flex-col border border-[var(--border-light)] cursor-pointer" onclick="window.location.href='#'">
                    <div class="relative h-[140px] w-full bg-gray-200">
                        <img src="https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=400&q=80" alt="Turf" class="w-full h-full object-cover">
                        <div class="absolute top-2 left-2 bg-white/95 backdrop-blur-sm text-[10px] font-bold text-[var(--text-heading)] px-2 py-1 rounded shadow-sm font-inter tracking-wide">
                            50% OFF
                        </div>
                        <div class="absolute -bottom-3 left-2 bg-[var(--primary-blue-dark)] text-white text-[12px] font-medium px-2.5 py-0.5 rounded-full flex items-center gap-1 border-[1.5px] border-white z-10 shadow-sm">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                            <span>4.2</span>
                        </div>
                    </div>
                    
                    <div class="p-3 pt-5 flex flex-col flex-1 justify-between gap-1">
                        <div class="flex flex-col gap-1">
                            <h3 class="text-[14px] font-semibold text-[var(--text-heading)] leading-tight truncate font-inter">Play Field Turf</h3>
                            <div class="flex items-center gap-1 text-[12px] text-[var(--text-body)]">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="flex-shrink-0">
                                    <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" fill="#3D3D3D"/>
                                </svg>
                                <span class="truncate">Thane Station (3km)</span>
                            </div>
                        </div>
                        
                        <div class="text-[12px] font-medium text-[var(--primary-blue)] mt-1 font-inter">
                            ₹400 onwards
                        </div>
                        
                        <button class="w-full bg-[var(--primary-blue-dark)] text-white text-[14px] font-medium py-2 rounded shadow-sm hover:opacity-90 transition-opacity mt-2 font-roboto tracking-wide">
                            Enquire Now
                        </button>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="turf-card bg-[var(--white-pure)] rounded-xl overflow-hidden flex flex-col border border-[var(--border-light)] cursor-pointer" onclick="window.location.href='#'">
                    <div class="relative h-[140px] w-full bg-gray-200">
                        <img src="https://images.unsplash.com/photo-1518605368461-1e1296cb3b54?w=400&q=80" alt="Turf" class="w-full h-full object-cover">
                        <div class="absolute top-2 left-2 bg-white/95 backdrop-blur-sm text-[10px] font-bold text-[var(--text-heading)] px-2 py-1 rounded shadow-sm font-inter tracking-wide">
                            50% OFF
                        </div>
                        <div class="absolute -bottom-3 left-2 bg-[var(--primary-blue-dark)] text-white text-[12px] font-medium px-2.5 py-0.5 rounded-full flex items-center gap-1 border-[1.5px] border-white z-10 shadow-sm">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                            <span>4.2</span>
                        </div>
                    </div>
                    <div class="p-3 pt-5 flex flex-col flex-1 justify-between gap-1">
                        <div class="flex flex-col gap-1">
                            <h3 class="text-[14px] font-semibold text-[var(--text-heading)] leading-tight truncate font-inter">The Multisports Turf</h3>
                            <div class="flex items-center gap-1 text-[12px] text-[var(--text-body)]">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="flex-shrink-0">
                                    <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" fill="#3D3D3D"/>
                                </svg>
                                <span class="truncate">Thane west (2km)</span>
                            </div>
                        </div>
                        <div class="text-[12px] font-medium text-[var(--primary-blue)] mt-1 font-inter">
                            ₹200 onwards
                        </div>
                        <button class="w-full bg-[var(--primary-blue-dark)] text-white text-[14px] font-medium py-2 rounded shadow-sm hover:opacity-90 transition-opacity mt-2 font-roboto tracking-wide">
                            Book Now
                        </button>
                    </div>
                </div>

                <!-- Card 4 -->
                <div class="turf-card bg-[var(--white-pure)] rounded-xl overflow-hidden flex flex-col border border-[var(--border-light)] cursor-pointer" onclick="window.location.href='#'">
                    <div class="relative h-[140px] w-full bg-gray-200">
                        <img src="https://images.unsplash.com/photo-1579952363873-27f3bade9f55?w=400&q=80" alt="Turf" class="w-full h-full object-cover">
                        <div class="absolute top-2 left-2 bg-white/95 backdrop-blur-sm text-[10px] font-bold text-[var(--text-heading)] px-2 py-1 rounded shadow-sm font-inter tracking-wide">
                            50% OFF
                        </div>
                        <div class="absolute -bottom-3 left-2 bg-[var(--primary-blue-dark)] text-white text-[12px] font-medium px-2.5 py-0.5 rounded-full flex items-center gap-1 border-[1.5px] border-white z-10 shadow-sm">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                            <span>4.2</span>
                        </div>
                    </div>
                    <div class="p-3 pt-5 flex flex-col flex-1 justify-between gap-1">
                        <div class="flex flex-col gap-1">
                            <h3 class="text-[14px] font-semibold text-[var(--text-heading)] leading-tight truncate font-inter">The Multisports Turf</h3>
                            <div class="flex items-center gap-1 text-[12px] text-[var(--text-body)]">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="flex-shrink-0">
                                    <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" fill="#3D3D3D"/>
                                </svg>
                                <span class="truncate">Thane west (2km)</span>
                            </div>
                        </div>
                        <div class="text-[12px] font-medium text-[var(--primary-blue)] mt-1 font-inter">
                            ₹200 onwards
                        </div>
                        <button class="w-full bg-[var(--primary-blue-dark)] text-white text-[14px] font-medium py-2 rounded shadow-sm hover:opacity-90 transition-opacity mt-2 font-roboto tracking-wide">
                            Book Now
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="absolute bottom-0 left-0 bg-[var(--white-pure)] border-t border-[var(--bg-container)] flex justify-center w-full z-50">
            <div class="w-full h-[66px] flex items-center justify-between px-6 pt-1">
                
                <!-- Home -->
                <a href="Home.html" class="flex flex-col items-center justify-center gap-[4px] min-w-14 group">
                    <div class="w-[24px] h-[24px] flex items-center justify-center text-gray-400 group-hover:text-gray-600 transition-colors">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg>
                    </div>
                    <span class="text-[12px] font-medium text-gray-500 font-inter">Home</span>
                </a>

                <!-- Book (Active) -->
                <a href="BookPage.html" class="flex flex-col items-center justify-center gap-[4px] min-w-14 group">
                    <!-- Icon container with active blue background effect -->
                    <div class="relative w-[50px] h-[32px] bg-[var(--bg-soft)] rounded-full flex items-center justify-center">
                        <div class="absolute inset-0 bg-[var(--primary-blue)] opacity-10 rounded-full"></div>
                        <div class="w-[20px] h-[20px] flex items-center justify-center text-[var(--primary-blue)]">
                            <!-- Custom Ticket Icon based on design -->
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                <path d="M22 10V6C22 4.9 21.1 4 20 4H4C2.9 4 2.01 4.9 2.01 6V10C3.11 10 4 10.9 4 12C4 13.1 3.11 14 2.01 14V18C2.01 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V14C20.9 14 20 13.1 20 12C20 10.9 22 10ZM11 15H9V13H11V15ZM11 11H9V9H11V11ZM15 15H13V13H15V15ZM15 11H13V9H15V11Z" />
                            </svg>
                        </div>
                    </div>
                    <span class="text-[12px] font-bold text-[var(--text-heading)] font-inter">Book</span>
                </a>

                <!-- More / Sports -->
                <a href="More.html" class="flex flex-col items-center justify-center gap-[4px] min-w-14 group">
                    <div class="w-[24px] h-[24px] flex items-center justify-center text-gray-400 group-hover:text-gray-600 transition-colors">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="20" x2="12" y2="10"></line>
                            <line x1="18" y1="20" x2="18" y2="4"></line>
                            <line x1="6" y1="20" x2="6" y2="16"></line>
                        </svg>
                    </div>
                    <span class="text-[12px] font-medium text-gray-500 font-inter">More</span>
                </a>

                <!-- Profile -->
                <a href="More.html" class="flex flex-col items-center justify-center gap-[4px] min-w-14 group">
                    <div class="w-[24px] h-[24px] flex items-center justify-center text-gray-400 group-hover:text-gray-600 transition-colors">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <span class="text-[12px] font-medium text-gray-500 font-inter">Profile</span>
                </a>

            </div>
        </nav>

    </div>

</body>
</html>
