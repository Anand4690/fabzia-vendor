<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Fabzia</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom Utility styles -->
    <link rel="stylesheet" href="utility.css">
    <style>
        :root {
            --primary: var(--primary-blue);
            --error: var(--error-red);
        }
        body {
            background-color: #FFFEFE;
            color: var(--text-primary);
            font-family: 'Lato', sans-serif;
        }
        .input-focus:focus-within {
            border-color: var(--primary-blue) !important;
        }
        .border-error {
            border-color: var(--error-red) !important;
        }
    </style>
</head>
<body class="flex min-h-screen items-start justify-center">
    <div class="w-full max-w-[430px] flex flex-col px-5 pb-10 pt-10">
        <!-- ── Header ── -->
        <div class="flex flex-col gap-2">
            <!-- Back button -->
            <button onclick="history.back()" type="button" aria-label="Go back" 
                class="flex h-9 w-9 items-center justify-center rounded-full bg-[var(--bg-soft)] focus:outline-none active:bg-gray-200 transition-colors">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M15 6L9 12L15 18" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="mt-2 flex flex-col gap-1">
                <h1 class="text-[32px] font-semibold leading-[40px] tracking-[0.04px] text-[var(--text-primary)]">
                    Forget Password
                </h1>
                <p class="text-[14px] font-normal leading-[150%] tracking-[0.04px] text-[var(--text-secondary)]">
                    We’ll send a code to your phone number.
                </p>
            </div>
        </div>

        <!-- ── Form ── -->
        <form id="forgot-password-form" class="mt-6 flex flex-col gap-4">
            <!-- Phone Number -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-[var(--text-primary)]">Enter Phone number</label>
                <div class="flex h-14 items-center gap-4 rounded-[8px] border border-[var(--border-light)] bg-white px-3 input-focus" id="phone-container">
                    <div class="flex items-center gap-1 px-1">
                        <span class="text-[16px] font-normal leading-6 tracking-[0.5px] text-[#0F0F0F]">+91</span>
                    </div>
                    <div class="h-6 w-px bg-[var(--border-light)]"></div>
                    <input type="tel" id="phone-input" placeholder="Phone number" inputmode="numeric" maxlength="11"
                        class="flex-1 bg-transparent text-[16px] outline-none placeholder:text-[var(--text-placeholder)]">
                </div>
            </div>

            <!-- OTP Field -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-semibold leading-[160%] tracking-[0.04px] text-[var(--text-primary)]">Enter OTP</label>
                <div class="flex h-[52px] items-center rounded-[8px] border border-[var(--border-light)] bg-white px-3 input-focus">
                    <input type="text" placeholder="Enter Code" class="flex-1 bg-transparent text-[16px] outline-none placeholder:text-[var(--text-placeholder)]">
                </div>
                <div class="flex justify-end px-0.5">
                    <button type="button" class="text-[14px] font-medium leading-[150%] tracking-[0.04px] text-[var(--text-secondary)] underline underline-offset-2">
                        Resend code
                    </button>
                </div>
            </div>

            <!-- Reset Password Button -->
            <div class="mt-4">
                <button type="submit" 
                    class="flex h-[52px] w-full items-center justify-center rounded-[8px] bg-[var(--primary-blue)] px-4 text-[16px] font-semibold leading-7 text-[#F9F6F3] transition-opacity active:opacity-80">
                    Reset Password
                </button>
            </div>
        </form>
    </div>

    <script>
        const phoneInput = document.getElementById('phone-input');
        
        function formatPhoneNumber(value) {
            let digits = value.replace(/\D/g, '');
            if (value.includes('+91')) {
                const after91 = value.split('+91')[1] || '';
                digits = after91.replace(/\D/g, '');
            } else if (digits.startsWith('91') && digits.length > 10) {
                digits = digits.substring(2);
            }
            digits = digits.substring(0, 10);
            if (digits.length > 5) {
                return digits.substring(0, 5) + ' ' + digits.substring(5);
            }
            return digits;
        }

        phoneInput.addEventListener('input', (e) => {
            e.target.value = formatPhoneNumber(e.target.value);
        });

        phoneInput.addEventListener('paste', (e) => {
            e.preventDefault();
            let pasteData = (e.clipboardData || window.clipboardData).getData('text');
            phoneInput.value = formatPhoneNumber(pasteData);
        });
        
        document.getElementById('forgot-password-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Basic logic: if valid, redirect to reset-password.html
            window.location.href = 'reset-password.html';
        });
    </script>
</body>
</html>
